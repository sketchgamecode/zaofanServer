name: Deploy Backend to Aliyun

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json # 这里改了

      - name: Install dependencies and Build
        # 去掉了 working-directory: server
        run: |
          npm install
          npm run build

      - name: Deploy to Aliyun via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 47.79.240.134
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "*" # 上传当前目录所有文件
          target: "/opt/zaofan-server"
          strip_components: 0 # 不再需要剥离 server/ 目录层级

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.79.240.134
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # 1. 尝试从常见路径加载环境变量
            [ -f ~/.bashrc ] && source ~/.bashrc
            [ -f /etc/profile ] && source /etc/profile
            
            # 2. 特别针对如果是用 nvm 安装的情况
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 3. 执行真正的逻辑
            cd /opt/zaofan-server
            # 这一步是为了确保生产环境依赖是最新的
            npm install --production
            # 重启或启动服务
            pm2 restart zaofan-server || pm2 start dist/index.js --name zaofan-server
